name: Tauri Pre CI

on:
  workflow_dispatch:
    inputs:
      build_debug:
        description: 'Also build debug Tauri bundles and upload artifacts'
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - '.github/workflows/tauri-pre-ci.yml'
      - 'electron/**'
      - 'node-sidecar/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'tests/**'
      - 'vite*.ts'
  push:
    branches:
      - main
      - tauri-migration
    paths:
      - '.github/workflows/tauri-pre-ci.yml'
      - 'electron/**'
      - 'node-sidecar/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/**'
      - 'src/**'
      - 'src-tauri/**'
      - 'tests/**'
      - 'vite*.ts'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Preflight (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Tauri preflight
        run: pnpm run verify:tauri-pre-ci

  debug-build:
    name: Debug build (${{ matrix.os }})
    needs: preflight
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_debug }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build debug Tauri bundle
        run: pnpm run tauri:build:debug

      - name: Smoke test debug binary
        env:
          TAURI_PROFILE: debug
        run: pnpm run test:tauri-launch

      - name: Upload debug bundle
        uses: actions/upload-artifact@v4
        with:
          name: tauri-debug-${{ runner.os }}
          path: src-tauri/target/debug/bundle/**
          if-no-files-found: warn
